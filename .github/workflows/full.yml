name: Tests (full matrix)

on:
  schedule:
    # Mon/Wed/Fri 03:00 UTC (06:00 MSK)
    - cron: "0 3 * * 1,3,5"
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: tests-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # On push: only when commit message contains [full-ci].
    # On schedule / manual dispatch: always run.
    if: >-
      github.event_name != 'push' ||
      contains(github.event.head_commit.message, '[full-ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra bridge

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Frontend type-check
        run: |
          cd frontend
          npm run check

      - name: Frontend tests
        run: |
          cd frontend
          npx vitest run

      - name: Build frontend
        run: |
          cd frontend
          npm run build
          rm -f ../src/rigplane/web/static
          mkdir -p ../src/rigplane/web/static
          cp -r dist/* ../src/rigplane/web/static/

      - name: Lint web boundary
        run: uv run ruff check src/rigplane/web

      - name: Type-check web boundary
        run: uv run mypy --strict src/rigplane/web

      - name: Lint architecture (import-linter)
        run: uv run lint-imports

      - name: Run tests
        id: tests
        run: |
          uv run pytest tests/ --ignore=tests/integration -n auto --tb=short --timeout=300 --timeout-method=thread \
            | tee pytest-output.txt
          SUMMARY=$(tail -1 pytest-output.txt)
          PASSED=$(echo "$SUMMARY" | grep -oP '\d+ passed' | grep -oP '\d+' || echo "0")
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"

      - name: Extract version
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/main'
        id: version
        run: |
          VERSION=$(uv run python -c "from importlib.metadata import version; print(version('rigplane'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update tests badge
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/main' && always()
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: bce917f4007ac491e527e142564fbbae
          filename: rigplane-tests.json
          label: tests
          message: "${{ steps.tests.outputs.passed }} passed"
          color: ${{ steps.tests.outcome == 'success' && 'brightgreen' || 'red' }}

      - name: Update version badge
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/main' && always()
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: bce917f4007ac491e527e142564fbbae
          filename: rigplane-version.json
          label: version
          message: "v${{ steps.version.outputs.version }}"
          color: blue

      - name: Update mypy badge
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/main' && always()
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: bce917f4007ac491e527e142564fbbae
          filename: rigplane-mypy.json
          label: mypy
          message: "0 errors"
          color: blue
