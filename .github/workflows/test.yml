name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra bridge

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          rm -f ../src/icom_lan/web/static
          mkdir -p ../src/icom_lan/web/static
          cp -r dist/* ../src/icom_lan/web/static/

      - name: Lint web boundary
        run: uv run ruff check src/icom_lan/web

      - name: Type-check web boundary
        run: uv run mypy --strict src/icom_lan/web

      - name: Lint architecture (import-linter)
        run: uv run lint-imports

      - name: Run tests
        id: tests
        run: |
          uv run pytest tests/test_*.py -v --tb=short --timeout=300 --timeout-method=thread \
            | tee pytest-output.txt
          SUMMARY=$(tail -1 pytest-output.txt)
          PASSED=$(echo "$SUMMARY" | grep -oP '\d+ passed' | grep -oP '\d+' || echo "0")
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"

      - name: Extract version
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/main'
        id: version
        run: |
          VERSION=$(uv run python -c "from importlib.metadata import version; print(version('icom-lan'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update tests badge
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/main' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: bce917f4007ac491e527e142564fbbae
          filename: icom-lan-tests.json
          label: tests
          message: "${{ steps.tests.outputs.passed }} passed"
          color: ${{ steps.tests.outcome == 'success' && 'brightgreen' || 'red' }}

      - name: Update version badge
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/main' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: bce917f4007ac491e527e142564fbbae
          filename: icom-lan-version.json
          label: version
          message: "v${{ steps.version.outputs.version }}"
          color: blue

      - name: Update mypy badge
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/main' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: bce917f4007ac491e527e142564fbbae
          filename: icom-lan-mypy.json
          label: mypy
          message: "0 errors"
          color: blue
