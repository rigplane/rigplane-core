# ─── CAT commands (Lab599 CAT Protocol rev. 2) ───────────────────────────────
# Wired in the loader-supported `{ cat = { read/write/parse } }` form. Parameter
# widths follow rev.2 exactly: FA/FB 11-digit Hz, MD 1-digit register, PC/TP/AG
# 3-digit, RA 2-digit, PA/NB/NR/NT/RT/XT/SP 1-digit. The future kenwood_cat
# backend binds to these names.
[commands]
# Frequency (FA/FB) — 11-digit Hz.
get_freq        = { cat = { read = "FA;", parse = "FA{freq:011d};" } }
set_freq        = { cat = { write = "FA{freq:011d};" } }
get_freq_b      = { cat = { read = "FB;", parse = "FB{freq:011d};" } }
set_freq_b      = { cat = { write = "FB{freq:011d};" } }
# Mode (MD) — single register digit: 1=LSB 2=USB 3=CW 4=FM 5=AM 6=DIG 7=CW-R.
get_mode        = { cat = { read = "MD;", parse = "MD{mode};" } }
set_mode        = { cat = { write = "MD{mode};" } }
# Full status (IF) — freq + RIT/XIT + mode + split + tone in one read.
get_info        = { cat = { read = "IF;" } }
# VFO / Memory select (FR/FT) — 0=VFO-A 1=VFO-B 2=Memory.
get_vfo_select  = { cat = { read = "FR;", parse = "FR{vfo};" } }
set_vfo_select  = { cat = { write = "FR{vfo};" } }
# PTT — RX/TX are parameterless; PT reads PTT state (0=RX 1=TX).
ptt_on          = { cat = { write = "TX;" } }
ptt_off         = { cat = { write = "RX;" } }
get_ptt         = { cat = { read = "PT;", parse = "PT{ptt};" } }
# Split (SP) — 0=OFF 1=ON.
get_split       = { cat = { read = "SP;", parse = "SP{split};" } }
set_split       = { cat = { write = "SP{split};" } }
# Output power (PC) — 010-100. TX-tune power (TP) — 005-050.
get_power       = { cat = { read = "PC;", parse = "PC{power:03d};" } }
set_power       = { cat = { write = "PC{power:03d};" } }
get_tune_power  = { cat = { read = "TP;", parse = "TP{power:03d};" } }
set_tune_power  = { cat = { write = "TP{power:03d};" } }
# AF gain (AG) 000-250 · RF gain (RG) 000-100 · squelch (SQ) 000-255.
get_af_level    = { cat = { read = "AG;", parse = "AG{level:03d};" } }
set_af_level    = { cat = { write = "AG0{level:03d};" } }
get_rf_gain     = { cat = { read = "RG;", parse = "RG{level:03d};" } }
set_rf_gain     = { cat = { write = "RG{level:03d};" } }
get_squelch     = { cat = { read = "SQ;", parse = "SQ0{level:03d};" } }
set_squelch     = { cat = { write = "SQ0{level:03d};" } }
# Preamp (PA) 0/1 · attenuator (RA) 00/01.
get_preamp      = { cat = { read = "PA;", parse = "PA{val};" } }
set_preamp      = { cat = { write = "PA{val};" } }
get_att         = { cat = { read = "RA;", parse = "RA{val:02d};" } }
set_att         = { cat = { write = "RA{val:02d};" } }
# Filter (FL) — RX 0-3 / TX 0-1.
get_filter      = { cat = { read = "FL;" } }
set_filter      = { cat = { write = "FL{rx}{tx};" } }
# DSP — noise blanker (NB/NL), noise reduction (NR/RL), notch (NT 0=OFF 1=Auto).
get_nb          = { cat = { read = "NB;", parse = "NB{val};" } }
set_nb          = { cat = { write = "NB{val};" } }
get_nr          = { cat = { read = "NR;", parse = "NR{val};" } }
set_nr          = { cat = { write = "NR{val};" } }
get_notch       = { cat = { read = "NT;", parse = "NT{val};" } }
set_notch       = { cat = { write = "NT{val};" } }
# RIT (RT) / XIT (XT) — 0=OFF 1=ON.
get_rit         = { cat = { read = "RT;", parse = "RT{val};" } }
set_rit         = { cat = { write = "RT{val};" } }
get_xit         = { cat = { read = "XT;", parse = "XT{val};" } }
set_xit         = { cat = { write = "XT{val};" } }
# CW keyer speed (KS) 004-060.
get_keyer_speed = { cat = { read = "KS;", parse = "KS{wpm:03d};" } }
set_keyer_speed = { cat = { write = "KS{wpm:03d};" } }
# Internal antenna tuner (AC, TX-500 MP).
get_tuner       = { cat = { read = "AC;" } }
set_tuner       = { cat = { write = "AC0{state}{tune};" } }
# Dial lock (LK) 0/1.
get_lock        = { cat = { read = "LK;", parse = "LK{val}0;" } }
set_lock        = { cat = { write = "LK{val}0;" } }
# S-meter (SM) / meter select (RM, Lab599) / supply voltage (VL, Lab599).
get_smeter      = { cat = { read = "SM0;", parse = "SM0{value:04d};" } }
get_meter       = { cat = { read = "RM;", parse = "RM{meter}{value:04d};" } }
get_voltage     = { cat = { read = "VL;", parse = "VL{volts:04d};" } }
# Transceiver ID (ID) — 019 / 500 / 505.
get_id          = { cat = { read = "ID;", parse = "ID{id};" } }
