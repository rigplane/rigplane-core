# Rig Configuration — Lab599 Discovery TX-500
# Lab599 TX-500 ultra-compact QRP HF/50 MHz SDR transceiver.
#
# Protocol: Kenwood-style ASCII CAT (semicolon-terminated, "FA00014200000;"),
#           modeled on the Kenwood TS-2000 set with Lab599 extensions. NOT CI-V.
#
# Source of truth: Lab599 CAT Protocol rev. 2 (official) — see the verbatim
# extract and audit at docs/validation/cat-audits/{manuals/tx500.txt,tx500.md}.
#
# CANONICAL PROFILE (MOR-684): this is the single source of truth for the
# TX-500. The previous reference sketch rigs/examples/lab599_tx500.toml was
# removed because (a) it was never loaded — rigs/examples/ is not scanned by
# discover_rigs and the sketch failed schema validation, (b) its
# [protocol.commands] block is silently ignored by the loader (commands live in
# the top-level [commands] table), and (c) it carried rev.2 errors (FSK/RTTY
# modes, "power NOT controllable via CAT") that this file corrects. Do not
# reintroduce a divergent second profile.
#
# NOTE: the TX-500 has no backend yet (backends/factory raises ValueError for
# model="TX-500"). The [commands] CAT strings below are wired in the
# loader-supported `{ cat = { read/write/parse } }` format so the future
# kenwood_cat backend has a rev.2-accurate command surface to bind to.

[radio]
id = "lab599_tx500"
model = "TX-500"
receiver_count = 1
has_lan = false
has_wifi = false
default_baud = 38400

[protocol]
type = "kenwood_cat"
# variant "lab599" enables the Lab599 extension commands (FL, IS, RM, VL, AL,
# MR/MW) on top of the TS-2000-compatible base set. ID; answers ID500 (TX-500)
# / ID505 (TX-500 MP) in native mode, or ID019 in TS-2000-compat mode.
variant = "lab599"

[capabilities]
features = [
    "audio",
    "af_level",      # AG  000-250
    "rf_gain",       # RG  000-100
    "squelch",       # SQ  000-255
    "attenuator",    # RA  00/01 (ON/OFF)
    "preamp",        # PA  0/1  (ON/OFF)
    "nb",            # NB / NL
    "nr",            # NR / RL
    "notch",         # NT  0=OFF 1=Auto
    "filter_width",  # FL  RX 0-3 / TX 0-1
    "tx",            # RX / TX / PT
    "split",         # SP  0/1  (TX-500)
    "vox",           # VX / VG / VD
    "cw",            # KS  keyer speed 004-060
    "rit",           # RT  0/1
    "xit",           # XT  0/1  (TX-500)
    "power_control", # PC  010-100 (output power) · TP 005-050 (TX-tune)
    "tuner",         # AC  internal ATU (TX-500 MP)
    "meters",        # SM / RM
    "scan",          # SC (status via IF P11)
    "dial_lock",     # LK  0/1
]

[modes]
# rev.2 MD register map (manufacturer protocol doc, full table):
#   1=LSB  2=USB  3=CW  4=FM  5=AM  6=DIG  7=CW-R
# There is NO FSK / RTTY mode and NO register 8 or 9 on the TX-500. The list
# below is the operator-facing label set; the set_mode/get_mode templates below
# carry the single-digit register. (Was wrongly 6=FSK / 9=FSK-R with RTTY
# labels and a "DIGI" label — corrected per MOR-684 / audit gap D.)
list = ["LSB", "USB", "CW", "FM", "AM", "DIG", "CW-R"]

[filters]
# FL command: RX filter 0-3 (P1), TX filter 0-1 (P2).
list = ["FIL1", "FIL2", "FIL3", "FIL4"]

[vfo]
scheme = "ab"

[attenuator]
values = [0, 1]
labels = { "0" = "OFF", "1" = "ON" }

[preamp]
values = [0, 1]
labels = { "0" = "OFF", "1" = "ON" }

[controls.attenuator]
style = "toggle"

# ATT and PREAMP are mutually exclusive on the TX-500 front end.
[[rules]]
kind = "mutex"
fields = ["attenuator", "preamp"]

# ─── Meters ──────────────────────────────────────────────────────────────────
# SM reads the S-meter (RX) / power-out (TX) in dots (0000-0030). RM selects the
# meter (0=POWER 1=SWR 2=MIC/DIG 3=ALC) and reads its dot value.
[meters.s_meter]
type = "linear"
raw_max = 30
unit = "dots"

[meters.power]
type = "linear"
raw_max = 30
max_watts = 10
unit = "W"

# ─── Bands ───────────────────────────────────────────────────────────────────
[[freq_ranges.ranges]]
label = "HF"
start_hz = 100000
end_hz = 54000000

[[freq_ranges.ranges.bands]]
name = "160m"
start_hz = 1800000
end_hz = 2000000
default_hz = 1825000

[[freq_ranges.ranges.bands]]
name = "80m"
start_hz = 3500000
end_hz = 3800000
default_hz = 3600000

[[freq_ranges.ranges.bands]]
name = "40m"
start_hz = 7000000
end_hz = 7200000
default_hz = 7100000

[[freq_ranges.ranges.bands]]
name = "30m"
start_hz = 10100000
end_hz = 10150000
default_hz = 10125000

[[freq_ranges.ranges.bands]]
name = "20m"
start_hz = 14000000
end_hz = 14350000
default_hz = 14200000

[[freq_ranges.ranges.bands]]
name = "17m"
start_hz = 18068000
end_hz = 18168000
default_hz = 18100000

[[freq_ranges.ranges.bands]]
name = "15m"
start_hz = 21000000
end_hz = 21450000
default_hz = 21200000

[[freq_ranges.ranges.bands]]
name = "12m"
start_hz = 24890000
end_hz = 24990000
default_hz = 24940000

[[freq_ranges.ranges.bands]]
name = "10m"
