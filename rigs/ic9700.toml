[protocol]
type = "civ"

[controls.attenuator]
style = "toggle"

[controls.nb]
style = "toggle_and_level"

[controls.nr]
style = "toggle_and_level"

# Level control ranges — raw CI-V values and display mapping
# IC-9700: dual receiver (MAIN/SUB), no cmd29; receiver targeting via
# 0x07 0xD0/0xD1 receiver-select before per-receiver commands.

[controls.pbt_inner]
raw_min = 0
raw_max = 255
raw_center = 128
display_min = -1200
display_max = 1200
display_unit = "Hz"

[controls.pbt_outer]
raw_min = 0
raw_max = 255
raw_center = 128
display_min = -1200
display_max = 1200
display_unit = "Hz"

[controls.af_level]
raw_min = 0
raw_max = 255

[controls.rf_gain]
raw_min = 0
raw_max = 255

[controls.squelch]
raw_min = 0
raw_max = 255

[controls.nr_level]
raw_min = 0
raw_max = 255

[controls.nb_level]
raw_min = 0
raw_max = 255

[controls.mic_gain]
raw_min = 0
raw_max = 255

[controls.rf_power]
raw_min = 0
raw_max = 255

[controls.monitor_gain]
raw_min = 0
raw_max = 255

[controls.compressor_level]
raw_min = 0
raw_max = 255

[controls.cw_pitch]
raw_min = 0
raw_max = 255
display_min = 300
display_max = 900
display_unit = "Hz"

[controls.rit]
raw_min = -999
raw_max = 999
raw_center = 0
display_min = -999
display_max = 999
display_unit = "Hz"

# SWR meter calibration — piecewise-linear lookup from raw 0–255 to SWR ratio.
# First four points (0=1.0, 48=1.5, 80=2.0, 120=3.0) match the firmware-anchored
# Icom curve documented for sibling models. Fifth point (240, 6.0) follows
# wfview IC-9700.rig. See P3-01 (issue #1173) and the R1 research note.
[meters.swr]
redline_raw = 120

[[meters.swr.calibration]]
raw = 0
actual = 1.0
label = "1.0"

[[meters.swr.calibration]]
raw = 48
actual = 1.5
label = "1.5"

[[meters.swr.calibration]]
raw = 80
actual = 2.0
label = "2.0"

[[meters.swr.calibration]]
raw = 120
actual = 3.0
label = "3.0"

[[meters.swr.calibration]]
raw = 240
actual = 6.0
label = "6.0+"
