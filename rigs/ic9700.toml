# Rig Configuration — IC-9700
# This file defines the IC-9700 radio profile in TOML format.
# See _schema.md for field documentation.
#
# Source: IC-9700 CI-V Reference Guide (PDF)
#         wfview IC-9700.rig
#         Dual-receiver capable, LAN + serial backends supported

[radio]
id = "icom_ic9700"
model = "IC-9700"
civ_addr = 0xA2
default_baud = 115200  # Required for scope data over serial CI-V
receiver_count = 2  # Dual receiver capable (unique to IC-9700)
has_lan = true  # LAN-capable transceiver
has_wifi = false

[spectrum]
seq_max = 11
amp_max = 160
data_len_max = 475

# Pin mono-first codec (#797). IC-9700 is dual-receiver (receiver_count=2) but
# no hardware has been available to validate stereo rx_codec negotiation;
# default to mono until proven. ``_control_phase`` retry-with-mono fallback
# provides a secondary safety net.
[audio]
codec_preference = ["PCM_1CH_16BIT", "ULAW_1CH"]
tx_codec = "PCM_1CH_16BIT"
browser_rx_transport = "auto"
browser_rx_transcode_to_opus = true

# ── Capabilities ─────────────────────────────────────────────────
# Feature tags determine which UI panels and controls are rendered.
# Grouped by functional area.

[capabilities]
features = [
    # Receiver
    "audio",
    "dual_rx",
    "dual_watch",
    "af_level",
    "rf_gain",
    "squelch",
    # RF front end
    "attenuator",
    "preamp",
    "ip_plus",
    # NOTE: no digisel on IC-7300
    # Antenna
    "antenna",
    # NOTE: no rx_antenna on IC-7300 (single antenna)
    # DSP / Noise
    "nb",
    "nr",
    "notch",
    "apf",
    "twin_peak",
    # Filter
    "pbt",
    "filter_width",
    "filter_shape",
    # TX
    "tx",
    "split",
    "vox",
    "compressor",
    "monitor",
    # NOTE: no drive_gain on IC-7300
    "ssb_tx_bw",
    # CW
    "cw",
    "break_in",
    # RIT / XIT
    "rit",
    "xit",
    # Tuner
    "tuner",
    # Metering
    "meters",
    # Scope
    "scope",
    # Tone
    "repeater_tone",
    "tsql",
    # Data
    "data_mode",
    # System
    "power_control",
    "dial_lock",
    "scan",
    "bsr",
    # AGC
    "agc",
    "tuning_step",
    "band_edge",
    "xfc",
    # System
    "system_settings",
]

# ── Parameterized Capabilities ───────────────────────────────────

[attenuator]
# CI-V 0x11: binary toggle only
# 0x00=OFF, 0x20=20dB ON
values = [0, 20]

[preamp]
# CI-V 0x16 0x02: 0=OFF, 1=P.AMP1, 2=P.AMP2
values = [0, 1, 2]

[agc]
# CI-V 0x16 0x12: 1=FAST, 2=MID, 3=SLOW (wfview IC-7300.rig lists Min/Max 0-2 for UI)
modes = [1, 2, 3]
labels = { "1" = "FAST", "2" = "MID", "3" = "SLOW" }

[antenna]
# CI-V 0x12: single antenna, no RX antenna
tx_count = 1
has_rx_ant = false

[apf]
# CI-V 0x16 0x32: 0=OFF, 1=ON (simple toggle, no WIDE/MID/NAR)
# Different from IC-7610 which has 0-3!
values = [0, 1]
labels = { "0" = "OFF", "1" = "ON" }

[notch]
# CI-V 0x16 0x57: Manual notch width
# 0=WIDE, 1=MID, 2=NAR (same as IC-7610)
width_values = [0, 1, 2]
width_labels = { "0" = "WIDE", "1" = "MID", "2" = "NAR" }

[ssb_tx_bw]
# CI-V 0x16 0x58: SSB TX bandwidth
# 0=WIDE, 1=MID, 2=NAR
values = [0, 1, 2]
labels = { "0" = "WIDE", "1" = "MID", "2" = "NAR" }

[break_in]
# CI-V 0x16 0x47: 0=OFF, 1=Semi, 2=Full (wfview rig lists Max=1; CI-V supports three levels)
values = [0, 1, 2]
labels = { "0" = "OFF", "1" = "SEMI", "2" = "FULL" }

[rit]
# CI-V 0x21 0x00: wfview RIT Min/Max ±999 (10 Hz BCD steps; same as [controls.rit] raw range)
range_hz = 999

[cw]
# CI-V 0x14 0x09: CW pitch 300-900 Hz
# CI-V 0x14 0x0C: Key speed 6-48 WPM
pitch_min_hz = 300
pitch_max_hz = 900
speed_min_wpm = 6
speed_max_wpm = 48
# NOTE: no dash_ratio on IC-7300 (not in wfview rig file)

[nb]
# CI-V 0x1A 0x05 0x01 0x89: NB depth 1-10, NB width 0-255 (wfview NB Depth Min/Max)
depth_min = 1
depth_max = 10
width_min = 0
width_max = 255

[power]
max_watts = 100

[modes]
list = ["USB", "LSB", "CW", "CW-R", "AM", "FM", "RTTY", "RTTY-R"]

[data_mode]
# CI-V 0x1A 0x06: DATA sub-mode (0=OFF, 1=DATA1)
# IC-7300 has only 1 DATA mode
count = 1
labels = { "0" = "OFF", "1" = "DATA" }

# Modulation input sources
# CI-V 0x1A 0x05 0x00 0x66-0x67: get/set mod input per DATA mode
inputs = [
    { value = 0, name = "MIC" },
    { value = 1, name = "ACC" },
    { value = 2, name = "MIC+ACC" },
    { value = 3, name = "USB" },
    { value = 4, name = "MIC+USB" },
]

[filters]
list = ["FIL1", "FIL2", "FIL3"]
# CI-V 0x1A 0x03: width is a 1-byte BCD index, not raw Hz.
# wfview's funcFilterWidth handler (icomcommander.cpp:1131) decodes a single
# BCD byte using the same segmented formula for all Icom rigs:
#   non-AM: pass 0..10 → 50..550 Hz step 50; pass 11..40 → 700..3600 Hz step 100
#   AM:     pass 0..49 → 200..10000 Hz step 200
# Matches IC-7610 / IC-7300 (issue #1156).
encoding = "segmented_bcd_index"
width_min_hz = 50
width_max_hz = 9999

[filters.width.USB]
min_hz = 50
max_hz = 3600
defaults = [3000, 2400, 1800]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.LSB]
min_hz = 50
max_hz = 3600
defaults = [3000, 2400, 1800]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.CW]
min_hz = 50
max_hz = 3600
defaults = [1200, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.CW-R]
min_hz = 50
max_hz = 3600
defaults = [1200, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.RTTY]
min_hz = 50
max_hz = 2700
defaults = [2400, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 2700, step_hz = 100, index_min = 10 },
]

[filters.width.RTTY-R]
min_hz = 50
max_hz = 2700
defaults = [2400, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 2700, step_hz = 100, index_min = 10 },
]

[filters.width.AM]
min_hz = 200
max_hz = 10000
step_hz = 200
defaults = [9000, 6000, 3000]
segments = [
    { hz_min = 200, hz_max = 10000, step_hz = 200, index_min = 0 },
]

[filters.width.FM]
fixed = true
defaults = [15000, 10000, 7000]

[vfo]
# IC-9700 has two receivers (MAIN/SUB), not VFO A/B at the radio level.
# CI-V 0x07 0xD0 = select MAIN receiver, 0x07 0xD1 = select SUB receiver.
# CI-V 0x07 0xB0 = swap MAIN/SUB, 0x07 0xB1 = equal MAIN=SUB.
# Bytes match the Icom CI-V dual-receiver convention also used by IC-7610.
# (wfview IC-9700.rig exposes only "VFO Equal AB" = 0x07 0xA0; the 0x07 0xB1
#  "Equal M/S" opcode is documented in the IC-9700 CI-V reference guide and
#  mirrors IC-7610 behaviour — untested on hardware for this file.)
scheme = "main_sub"
main_select = [0xD0]
sub_select = [0xD1]
swap_main_sub = [0xB0]
equal_main_sub = [0xB1]

# ── Frequency Ranges ─────────────────────────────────────────────

[[freq_ranges.ranges]]
label = "HF"
start_hz = 30_000
end_hz = 60_000_000

[[freq_ranges.ranges.bands]]
name = "160m"
start_hz = 1_800_000
end_hz = 2_000_000
default_hz = 1_825_000
bsr_code = 0x01

[[freq_ranges.ranges.bands]]
name = "80m"
start_hz = 3_500_000
end_hz = 4_000_000
default_hz = 3_700_000
bsr_code = 0x02

[[freq_ranges.ranges.bands]]
name = "60m"
start_hz = 5_330_000
end_hz = 5_410_000
default_hz = 5_357_000

[[freq_ranges.ranges.bands]]
name = "40m"
start_hz = 7_000_000
end_hz = 7_300_000
default_hz = 7_100_000
bsr_code = 0x03

[[freq_ranges.ranges.bands]]
name = "30m"
start_hz = 10_100_000
end_hz = 10_150_000
default_hz = 10_130_000
bsr_code = 0x04

[[freq_ranges.ranges.bands]]
name = "20m"
start_hz = 14_000_000
end_hz = 14_350_000
default_hz = 14_200_000
bsr_code = 0x05

[[freq_ranges.ranges.bands]]
name = "17m"
start_hz = 18_068_000
end_hz = 18_168_000
default_hz = 18_120_000
bsr_code = 0x06

[[freq_ranges.ranges.bands]]
name = "15m"
start_hz = 21_000_000
end_hz = 21_450_000
default_hz = 21_200_000
bsr_code = 0x07

[[freq_ranges.ranges.bands]]
name = "12m"
start_hz = 24_890_000
end_hz = 24_990_000
default_hz = 24_940_000
bsr_code = 0x08

[[freq_ranges.ranges.bands]]
name = "10m"
start_hz = 28_000_000
end_hz = 29_700_000
default_hz = 28_500_000
bsr_code = 0x09

[[freq_ranges.ranges]]
label = "6m"
start_hz = 50_000_000
end_hz = 54_000_000

[[freq_ranges.ranges.bands]]
name = "6m"
start_hz = 50_000_000
end_hz = 54_000_000
default_hz = 50_125_000
bsr_code = 0x0A

# ── Command 29 Routes ───────────────────────────────────────────
# The IC-9700 uses the MAIN/SUB receiver-select scheme (0x07 0xD0/0xD1)
# to target per-receiver commands, NOT the cmd29 prefix used by the
# IC-7610 / IC-7760 / IC-785x. wfview's IC-9700.rig sets
# `HasCommand29=false` at the file level and marks every individual
# command `Command29=false`, matching the published CI-V reference
# guide. Keep this list empty so supports_cmd29() returns False and
# the command layer falls back to the MAIN/SUB receiver-switch path.

[cmd29]
routes = []

# ── CI-V Commands ────────────────────────────────────────────────
# Grouped by capability area. Wire bytes as integer arrays.
# Source: IC-9700 CI-V Reference Guide + wfview IC-9700.rig.

[commands]

# ── Frequency / Mode ──
get_freq = [0x03]
set_freq = [0x05]
get_mode = [0x04]
set_mode = [0x06]
get_band_edge_freq = [0x02]
get_selected_freq = [0x25, 0x00]          # Selected VFO freq
get_unselected_freq = [0x25, 0x01]        # Unselected VFO freq
get_selected_mode = [0x26, 0x00]          # Selected VFO mode
get_unselected_mode = [0x26, 0x01]        # Unselected VFO mode

# ── VFO / Dual Receiver ──
get_vfo = [0x07]
set_vfo = [0x07]
get_split = [0x0F]
set_split = [0x0F]
# Dual Watch on/off: 0x07 0xC2 = read state, 0x07 0xC1 = ON, 0x07 0xC0 = OFF.
# (wfview IC-9700.rig exposes VFO Dual Watch via menu path 0x16 0x59;
#  0x07 0xCx is the direct CI-V opcode per Icom CI-V reference guide.)
get_dual_watch = [0x07, 0xC2]
set_dual_watch_on = [0x07, 0xC1]
set_dual_watch_off = [0x07, 0xC0]
# 0x07 0xD2: read/write which band is bound to MAIN/SUB (0=MAIN, 1=SUB).
get_main_sub_band = [0x07, 0xD2]

# ── Tuning ──
get_tuning_step = [0x10]
set_tuning_step = [0x10]

# ── RF Front End (Attenuator / Preamp) ──
get_attenuator = [0x11]
set_attenuator = [0x11]
get_preamp = [0x16, 0x02]
set_preamp = [0x16, 0x02]
get_ip_plus = [0x16, 0x65]
set_ip_plus = [0x16, 0x65]
# NOTE: no digisel (0x16 0x4E), no digisel_shift (0x14 0x13) on IC-7300

# ── Antenna ──
get_antenna = [0x12]                      # Single antenna
set_antenna = [0x12]
# NOTE: no rx_antenna (0x16 0x53) on IC-7300

# ── Audio / AF ──
get_af_level = [0x14, 0x01]
set_af_level = [0x14, 0x01]
get_rf_gain = [0x14, 0x02]
set_rf_gain = [0x14, 0x02]
get_squelch = [0x14, 0x03]
set_squelch = [0x14, 0x03]
# NOTE: no af_mute (0x1A 0x09) on IC-7300

# ── DSP / Noise (NB, NR, Notch, APF, Twin Peak) ──
get_nb = [0x16, 0x22]
set_nb = [0x16, 0x22]
get_nb_level = [0x14, 0x12]
set_nb_level = [0x14, 0x12]
get_nr = [0x16, 0x40]
set_nr = [0x16, 0x40]
get_nr_level = [0x14, 0x06]
set_nr_level = [0x14, 0x06]
get_auto_notch = [0x16, 0x41]
set_auto_notch = [0x16, 0x41]
get_manual_notch = [0x16, 0x48]
set_manual_notch = [0x16, 0x48]
get_notch_filter = [0x14, 0x0D]           # Notch position 0-255
set_notch_filter = [0x14, 0x0D]
get_manual_notch_width = [0x16, 0x57]     # 0=WIDE, 1=MID, 2=NAR
set_manual_notch_width = [0x16, 0x57]
get_audio_peak_filter = [0x16, 0x32]      # IC-7300: 0=OFF, 1=ON only
set_audio_peak_filter = [0x16, 0x32]
get_apf_type_level = [0x14, 0x05]         # NOT_IMPLEMENTED — APF position (not in 7300 wfview)
set_apf_type_level = [0x14, 0x05]
get_twin_peak_filter = [0x16, 0x4F]
set_twin_peak_filter = [0x16, 0x4F]

# ── Filter (PBT, IF width, shape) ──
get_pbt_inner = [0x14, 0x07]
set_pbt_inner = [0x14, 0x07]
get_pbt_outer = [0x14, 0x08]
set_pbt_outer = [0x14, 0x08]
get_filter_width = [0x1A, 0x03]           # 50-10000 Hz
set_filter_width = [0x1A, 0x03]
get_filter_shape = [0x16, 0x56]
set_filter_shape = [0x16, 0x56]
get_agc = [0x16, 0x12]
set_agc = [0x16, 0x12]
get_agc_time_constant = [0x1A, 0x04]
set_agc_time_constant = [0x1A, 0x04]

# ── TX Controls (Power, Mic, Compressor, Monitor, VOX) ──
ptt_on = [0x1C, 0x00]
ptt_off = [0x1C, 0x00]
get_rf_power = [0x14, 0x0A]
set_rf_power = [0x14, 0x0A]
get_mic_gain = [0x14, 0x0B]
set_mic_gain = [0x14, 0x0B]
# NOTE: no drive_gain (0x14 0x14) on IC-7300
get_compressor = [0x16, 0x44]
set_compressor = [0x16, 0x44]
get_compressor_level = [0x14, 0x0E]
set_compressor_level = [0x14, 0x0E]
get_monitor = [0x16, 0x45]
set_monitor = [0x16, 0x45]
get_monitor_gain = [0x14, 0x15]
set_monitor_gain = [0x14, 0x15]
get_vox = [0x16, 0x46]
set_vox = [0x16, 0x46]
get_vox_gain = [0x14, 0x16]
set_vox_gain = [0x14, 0x16]
get_anti_vox_gain = [0x14, 0x17]
set_anti_vox_gain = [0x14, 0x17]
get_ssb_tx_bandwidth = [0x16, 0x58]
set_ssb_tx_bandwidth = [0x16, 0x58]

# ── Split ──
get_tx_freq_monitor = [0x1C, 0x03]
set_tx_freq_monitor = [0x1C, 0x03]
get_xfc_status = [0x1C, 0x02]             # XFC = transmit frequency monitor
set_xfc_status = [0x1C, 0x02]

# ── CW ──
send_cw = [0x17]
stop_cw = [0x17]
get_cw_pitch = [0x14, 0x09]
set_cw_pitch = [0x14, 0x09]
get_key_speed = [0x14, 0x0C]
set_key_speed = [0x14, 0x0C]
get_break_in = [0x16, 0x47]
set_break_in = [0x16, 0x47]
get_break_in_delay = [0x14, 0x0F]
set_break_in_delay = [0x14, 0x0F]

# ── RIT / ∂TX (XIT) ──
get_rit_frequency = [0x21, 0x00]
set_rit_frequency = [0x21, 0x00]
get_rit_status = [0x21, 0x01]
set_rit_status = [0x21, 0x01]
get_rit_tx_status = [0x21, 0x02]          # ∂TX on/off
set_rit_tx_status = [0x21, 0x02]

# ── Tuner / ATU ──
get_tuner_status = [0x1C, 0x01]
set_tuner_status = [0x1C, 0x01]

# ── Meters ──
get_s_meter = [0x15, 0x02]
get_s_meter_sql_status = [0x15, 0x01]
get_s_meter_sql_status_04 = [0x15, 0x04]
get_various_squelch = [0x15, 0x05]
get_overflow_status = [0x15, 0x07]
get_power_meter = [0x15, 0x11]
get_swr = [0x15, 0x12]
get_alc = [0x15, 0x13]
get_comp_meter = [0x15, 0x14]
get_vd_meter = [0x15, 0x15]
get_id_meter = [0x15, 0x16]

# ── Tone / TSQL ──
get_repeater_tone = [0x16, 0x42]
set_repeater_tone = [0x16, 0x42]
get_repeater_tsql = [0x16, 0x43]
set_repeater_tsql = [0x16, 0x43]
get_tone_freq = [0x1B, 0x00]
set_tone_freq = [0x1B, 0x00]
get_tsql_freq = [0x1B, 0x01]
set_tsql_freq = [0x1B, 0x01]

# ── Data Mode ──
get_data_mode = [0x1A, 0x06]
set_data_mode = [0x1A, 0x06]

# ── Scope ──
get_scope_wave = [0x27, 0x00]
set_scope_wave = [0x27, 0x00]
scope_on = [0x27, 0x10]
scope_off = [0x27, 0x10]
scope_data_output = [0x27, 0x11]
# NOTE: no scope_main_sub (0x27 0x12) — single receiver
get_scope_single_dual = [0x27, 0x13]
get_scope_mode = [0x27, 0x14]
get_scope_span = [0x27, 0x15]
get_scope_edge = [0x27, 0x16]
get_scope_hold = [0x27, 0x17]
get_scope_ref = [0x27, 0x19]
get_scope_speed = [0x27, 0x1A]
get_scope_during_tx = [0x27, 0x1B]
get_scope_center_type = [0x27, 0x1C]
get_scope_vbw = [0x27, 0x1D]
get_scope_fixed_edge = [0x27, 0x1E]
get_scope_rbw = [0x27, 0x1F]

# ── Scan ──
scan_start = [0x0E]
scan_stop = [0x0E]

# ── System / Power ──
power_on = [0x18]
power_off = [0x18]
get_transceiver_id = [0x19, 0x00]
set_speech = [0x13]
get_dial_lock = [0x16, 0x50]
set_dial_lock = [0x16, 0x50]

# ── Band Stacking Register ──
get_bsr = [0x1A, 0x01]
set_bsr = [0x1A, 0x01]

# ── Memory ── (NOT_IMPLEMENTED)
# get_memory_contents = [0x1A, 0x00]
# set_memory_contents = [0x1A, 0x00]
# set_memory_mode = [0x08]
# memory_clear = [0x0B]

# Menu 0x1A 0x05 sub-addresses: see [commands.overrides] (wfview IC-7300.rig)

[commands.overrides]
# 0x1A 0x05 menu: RX/TX EQ + per-band scope edges (wfview IC-7300.rig)
get_ssb_rx_hpflpf = [0x1A, 0x05, 0x00, 0x01]
set_ssb_rx_hpflpf = [0x1A, 0x05, 0x00, 0x01]
get_ssb_rx_bass = [0x1A, 0x05, 0x00, 0x02]
set_ssb_rx_bass = [0x1A, 0x05, 0x00, 0x02]
get_ssb_rx_treble = [0x1A, 0x05, 0x00, 0x03]
set_ssb_rx_treble = [0x1A, 0x05, 0x00, 0x03]
get_am_rx_hpflpf = [0x1A, 0x05, 0x00, 0x04]
set_am_rx_hpflpf = [0x1A, 0x05, 0x00, 0x04]
get_am_rx_bass = [0x1A, 0x05, 0x00, 0x05]
set_am_rx_bass = [0x1A, 0x05, 0x00, 0x05]
get_am_rx_treble = [0x1A, 0x05, 0x00, 0x06]
