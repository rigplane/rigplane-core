# Rig Configuration — IC-7610
# This file defines the IC-7610 radio profile in TOML format.
# See _schema.md for field documentation.
#
# Source: IC-7610 CI-V Reference Guide (Rev. 4, Sep 2025)
#         wfview IC-7610.rig (v2.10)
#         Hardware testing (firmware 1.42)

[radio]
id = "icom_ic7610"
model = "IC-7610"
civ_addr = 0x98
default_baud = 115200
receiver_count = 2
has_lan = true
has_wifi = false

[audio]
# Direct IC-7610 LAN is PCM-first. Opus is only allowed as a browser
# consumer transport after the server receives radio-native PCM.
codec_preference = ["PCM_2CH_16BIT", "PCM_1CH_16BIT", "ULAW_2CH", "ULAW_1CH"]
tx_codec = "PCM_1CH_16BIT"
default_sample_rate_hz = 16000
sample_rate_by_codec = { PCM_2CH_16BIT = 16000, PCM_1CH_16BIT = 16000 }
browser_rx_transport = "auto"
browser_rx_transcode_to_opus = true

[spectrum]
seq_max = 15
amp_max = 200
data_len_max = 689

[scope]
ref_min_db = -30.0
ref_max_db = 10.0
ref_step_db = 0.5

# ── Capabilities ─────────────────────────────────────────────────
# Feature tags determine which UI panels and controls are rendered.
# Grouped by functional area.

[capabilities]
features = [
    # Receiver
    "audio",
    "dual_rx",
    "dual_watch",
    # LAN audio stereo routing via Phones L/R Mix (0x1A 05 00 72).
    # IC-7610-only menu item — do NOT add to IC-9700 or FTX-1 even though
    # they also have receiver_count=2 (#787 / #792 / #794).
    "lan_dual_rx_audio_routing",
    "af_level",
    "rf_gain",
    "squelch",
    # RF front end
    "attenuator",
    "preamp",
    "digisel",
    "ip_plus",
    # Antenna
    "antenna",
    "rx_antenna",
    # DSP / Noise
    "nb",
    "nr",
    "notch",
    "apf",
    "twin_peak",
    # Filter
    "pbt",
    "filter_width",
    "filter_shape",
    # TX
    "tx",
    "split",
    "vox",
    "compressor",
    "monitor",
    "drive_gain",
    "ssb_tx_bw",
    # CW
    "cw",
    "break_in",
    # RIT / XIT
    "rit",
    "xit",
    # Tuner
    "tuner",
    # Metering
    "meters",
    # Scope
    "scope",
    # Tone
    "repeater_tone",
    "tsql",
    # Data
    "data_mode",
    # AGC
    "agc",
    # System
    "power_control",
    "dial_lock",
    "scan",
    "bsr",
    "main_sub_tracking",
    "tuning_step",
    "band_edge",
    "xfc",
    # System
    "system_settings",
]

# ── Parameterized Capabilities ───────────────────────────────────

[attenuator]
# CI-V 0x11: 16 discrete steps, 3 dB each (verified from CI-V PDF p.4)
values = [0, 3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36, 39, 42, 45]

[preamp]
# CI-V 0x16 0x02: 0=OFF, 1=P.AMP1, 2=P.AMP2
values = [0, 1, 2]

[agc]
# CI-V 0x16 0x12: 1=FAST, 2=MID, 3=SLOW
modes = [1, 2, 3]
labels = { "1" = "FAST", "2" = "MID", "3" = "SLOW" }

[antenna]
# CI-V 0x12: 0x00=ANT1, 0x01=ANT2 (each with RX ANT sub-data)
# CI-V 0x16 0x53: RX-I/O antenna connector (separate)
# ant_modes (OFF/Manual/Auto) are UI labels. Do not confuse with 0x1A 0x05 0x00 0x89 — that menu address is USB Mod Level (wfview IC-7610.rig).
tx_count = 2
has_rx_ant = true
ant_modes = ["off", "manual", "auto"]

[apf]
# CI-V 0x16 0x32: 0=OFF, 1=WIDE(320Hz), 2=MID(160Hz), 3=NAR(80Hz)
# Note: IC-7300 only has ON/OFF (0/1)
values = [0, 1, 2, 3]
labels = { "0" = "OFF", "1" = "WIDE", "2" = "MID", "3" = "NAR" }

[notch]
# CI-V 0x16 0x57: Manual notch width
# 0=WIDE, 1=MID, 2=NAR
width_values = [0, 1, 2]
width_labels = { "0" = "WIDE", "1" = "MID", "2" = "NAR" }

[ssb_tx_bw]
# CI-V 0x16 0x58: SSB TX bandwidth
# 0=WIDE, 1=MID, 2=NAR
values = [0, 1, 2]
labels = { "0" = "WIDE", "1" = "MID", "2" = "NAR" }

[break_in]
# CI-V 0x16 0x47: 0=OFF, 1=Semi, 2=Full
values = [0, 1, 2]
labels = { "0" = "OFF", "1" = "SEMI", "2" = "FULL" }

[rit]
# CI-V 0x21 0x00: ±9.999 kHz in 10 Hz steps
range_hz = 9999

[cw]
# CI-V 0x14 0x09: CW pitch 300-900 Hz (5 Hz steps)
# CI-V 0x14 0x0C: Key speed 6-48 WPM
# CI-V 0x1A 0x05 0x02 0x28: Dash ratio 2.8-4.5 (28-45)
pitch_min_hz = 300
pitch_max_hz = 900
speed_min_wpm = 6
speed_max_wpm = 48
dash_ratio_min = 28
dash_ratio_max = 45

[nb]
# CI-V 0x1A 0x05 0x02 0x90: NB depth 0-9 (maps to 1-10)
# CI-V 0x1A 0x05 0x02 0x91: NB width 0-255
depth_min = 0
depth_max = 9
width_min = 0
width_max = 255

[power]
max_watts = 100

[modes]
list = ["USB", "LSB", "CW", "CW-R", "AM", "FM", "RTTY", "RTTY-R", "PSK", "PSK-R"]

[data_mode]
# CI-V 0x1A 0x06: DATA sub-mode (0=OFF, 1=DATA1, 2=DATA2, 3=DATA3)
# IC-7610 has 3 DATA modes with separate mod input sources
count = 3
labels = { "0" = "OFF", "1" = "D1", "2" = "D2", "3" = "D3" }

# Modulation input sources available for each DATA mode
# Each data mode (OFF, D1, D2, D3) can select from these inputs
# CI-V 0x1A 0x05 0x00 0x91-0x94: get/set mod input per DATA mode
# Values are CI-V register bytes sent as data payload
inputs = [
    { value = 0, name = "MIC" },
    { value = 1, name = "ACC" },
    { value = 3, name = "USB" },
    { value = 5, name = "LAN" },
    { value = 2, name = "MIC+ACC" },
    { value = 4, name = "MIC+USB" },
]

[filters]
list = ["FIL1", "FIL2", "FIL3"]
# CI-V 0x1A 0x03: width is a BCD-encoded index, not raw Hz.
encoding = "segmented_bcd_index"
width_min_hz = 50
width_max_hz = 9999

[filters.width.USB]
min_hz = 50
max_hz = 3600
defaults = [3000, 2400, 1800]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.LSB]
min_hz = 50
max_hz = 3600
defaults = [3000, 2400, 1800]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.USB-D]
min_hz = 50
max_hz = 3600
defaults = [3000, 1200, 500]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.LSB-D]
min_hz = 50
max_hz = 3600
defaults = [3000, 1200, 500]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.CW]
min_hz = 50
max_hz = 3600
defaults = [1200, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.CW-R]
min_hz = 50
max_hz = 3600
defaults = [1200, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.RTTY]
min_hz = 50
max_hz = 2700
defaults = [2400, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 2700, step_hz = 100, index_min = 10 },
]

[filters.width.RTTY-R]
min_hz = 50
max_hz = 2700
defaults = [2400, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 2700, step_hz = 100, index_min = 10 },
]

[filters.width.AM]
min_hz = 200
max_hz = 10000
step_hz = 200
defaults = [9000, 6000, 3000]
segments = [
    { hz_min = 200, hz_max = 10000, step_hz = 200, index_min = 0 },
]

[filters.width.FM]
fixed = true
defaults = [15000, 10000, 7000]

[vfo]
scheme = "main_sub"
main_select = [0xD0]
sub_select = [0xD1]
swap_main_sub = [0xB0]   # MAIN ↔ SUB receiver swap (issue #710)
equal_main_sub = [0xB1]  # MAIN = SUB receiver equalize (issue #710)

