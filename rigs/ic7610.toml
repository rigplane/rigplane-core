# ── Command 29 Routes ───────────────────────────────────────────
# Commands that use the Command29 prefix for dual-receiver targeting.
# Each entry: [command_byte, sub_byte] or [command_byte] for cmd-only.
# Source: wfview IC-7610.rig Command29=true entries, cross-checked against
# IC-7610 CI-V Reference Guide Rev.4 command table (pp.3-9).
# Excluded — transceiver-global per PDF + wfview agreement:
#   0x14 0x0B mic gain, 0x14 0x0C key speed, 0x14 0x0E comp level,
#   0x14 0x0F break-in delay, 0x14 0x14-17 drive/moni/vox/anti-vox.
# PDF-vs-wfview disagreement — PDF primary source wins (issue #708 review):
#   0x14 0x0D notch filter — PDF p.3 shows the 29-glyph, wfview records
#   Command29=false; PDF takes precedence as the primary IC-7610 reference.
#   Without this route, both receivers would share a single notch position
#   on dual-RX — a real functional limitation.
# Ambiguous — PDF 29-glyph present, wfview disagrees or absent (left out):
#   0x1A 0x0A per-Rx OVF status.
# See docs/parity/ic7610_command_matrix.json for per-row rationale (issue #725).

[cmd29]
routes = [
    [0x11],           # Attenuator
    [0x12],           # Antenna
    [0x14, 0x01],     # AF Gain
    [0x14, 0x02],     # RF Gain
    [0x14, 0x03],     # Squelch
    [0x14, 0x05],     # APF Type Level
    [0x14, 0x06],     # NR Level
    [0x14, 0x07],     # PBT Inner
    [0x14, 0x08],     # PBT Outer
    [0x14, 0x0D],     # Notch Filter (PDF p.3 29-glyph; wfview Command29=false;
                      #  PDF precedence — per-receiver notch position)
    [0x14, 0x12],     # NB Level
    [0x14, 0x13],     # DIGI-SEL Shift
    [0x15, 0x01],     # S-meter squelch status
    [0x15, 0x02],     # S-meter level
    [0x15, 0x05],     # Various squelch
    [0x16, 0x02],     # Preamp
    [0x16, 0x22],     # NB on/off
    [0x16, 0x32],     # Audio Peak Filter
    [0x16, 0x40],     # NR on/off
    [0x16, 0x41],     # Auto Notch
    [0x16, 0x42],     # Repeater Tone
    [0x16, 0x43],     # Tone Squelch
    [0x16, 0x48],     # Manual Notch
    [0x16, 0x4E],     # DIGI-SEL on/off
    [0x16, 0x4F],     # Twin Peak Filter
    [0x16, 0x53],     # RX Antenna
    [0x16, 0x56],     # Filter Shape
    [0x16, 0x65],     # IP+
    [0x1A, 0x03],     # Filter Width
    [0x1A, 0x04],     # AGC Time Constant
    [0x1A, 0x09],     # AF Mute
    [0x1B, 0x00],     # Tone Frequency
    [0x1B, 0x01],     # TSQL Frequency
]

# ── CI-V Commands ────────────────────────────────────────────────
# Grouped by capability area. Wire bytes as integer arrays.
# Source: IC-7610 CI-V Reference Guide (Rev. 4)
#
# Legend:
#   # NOT_IMPLEMENTED — command known from CI-V ref but not yet
#                       handled by the rigplane backend

[commands]

# ── Frequency / Mode ──
get_freq = [0x03]
set_freq = [0x05]
get_mode = [0x04]
set_mode = [0x06]
get_band_edge_freq = [0x02]

# ── VFO / Dual Receiver ──
get_vfo = [0x07]
set_vfo = [0x07]
get_split = [0x0F]
set_split = [0x0F]
get_dual_watch = [0x07, 0xC2]             # 0=OFF, 1=ON
set_dual_watch_on = [0x07, 0xC1]
set_dual_watch_off = [0x07, 0xC0]
get_main_sub_band = [0x07, 0xD2]          # 0=MAIN, 1=SUB
get_main_sub_tracking = [0x16, 0x5E]      # 0=OFF, 1=ON
set_main_sub_tracking = [0x16, 0x5E]
get_selected_freq = [0x25, 0x00]          # Read selected band freq
get_unselected_freq = [0x25, 0x01]        # Read unselected band freq
get_selected_mode = [0x26, 0x00]          # Read selected band mode
get_unselected_mode = [0x26, 0x01]        # Read unselected band mode

# ── Tuning ──
get_tuning_step = [0x10]
set_tuning_step = [0x10]

# ── RF Front End (Attenuator / Preamp / DIGI-SEL / IP+) ──
get_attenuator = [0x11]
set_attenuator = [0x11]
get_preamp = [0x16, 0x02]
set_preamp = [0x16, 0x02]
get_digisel = [0x16, 0x4E]
set_digisel = [0x16, 0x4E]
get_digisel_shift = [0x14, 0x13]
set_digisel_shift = [0x14, 0x13]
get_ip_plus = [0x16, 0x65]
set_ip_plus = [0x16, 0x65]

# ── Antenna ──
get_antenna = [0x12]                      # Sub: 0x00=ANT1, 0x01=ANT2; Data: 0/1=RX ANT OFF/ON
set_antenna = [0x12]
get_rx_antenna = [0x16, 0x53]             # RX-I/O connector 0=OFF, 1=ON
set_rx_antenna = [0x16, 0x53]
get_civ_output_ant = [0x1C, 0x04]
set_civ_output_ant = [0x1C, 0x04]

# ── Audio / AF ──
get_af_level = [0x14, 0x01]
set_af_level = [0x14, 0x01]
get_rf_gain = [0x14, 0x02]
set_rf_gain = [0x14, 0x02]
get_squelch = [0x14, 0x03]
set_squelch = [0x14, 0x03]
get_af_mute = [0x1A, 0x09]
set_af_mute = [0x1A, 0x09]

# ── DSP / Noise (NB, NR, Notch, APF, Twin Peak) ──
get_nb = [0x16, 0x22]
set_nb = [0x16, 0x22]
get_nb_level = [0x14, 0x12]
set_nb_level = [0x14, 0x12]
get_nr = [0x16, 0x40]
set_nr = [0x16, 0x40]
get_nr_level = [0x14, 0x06]
set_nr_level = [0x14, 0x06]
get_auto_notch = [0x16, 0x41]
set_auto_notch = [0x16, 0x41]
get_manual_notch = [0x16, 0x48]
set_manual_notch = [0x16, 0x48]
get_notch_filter = [0x14, 0x0D]           # Notch position 0-255
set_notch_filter = [0x14, 0x0D]
get_manual_notch_width = [0x16, 0x57]     # 0=WIDE, 1=MID, 2=NAR
set_manual_notch_width = [0x16, 0x57]
get_audio_peak_filter = [0x16, 0x32]      # 0=OFF, 1=WIDE, 2=MID, 3=NAR
set_audio_peak_filter = [0x16, 0x32]
get_apf_type_level = [0x14, 0x05]         # APF position 0-255
set_apf_type_level = [0x14, 0x05]
get_twin_peak_filter = [0x16, 0x4F]
set_twin_peak_filter = [0x16, 0x4F]

# ── Filter (PBT, IF width, shape) ──
get_pbt_inner = [0x14, 0x07]
set_pbt_inner = [0x14, 0x07]
get_pbt_outer = [0x14, 0x08]
set_pbt_outer = [0x14, 0x08]
get_filter_width = [0x1A, 0x03]           # 50-10000 Hz, cmd29
set_filter_width = [0x1A, 0x03]
get_filter_shape = [0x16, 0x56]           # 0=SHARP, 1=SOFT
set_filter_shape = [0x16, 0x56]
get_agc = [0x16, 0x12]
set_agc = [0x16, 0x12]
get_agc_time_constant = [0x1A, 0x04]
set_agc_time_constant = [0x1A, 0x04]

# ── TX Controls (Power, Mic, Compressor, Monitor, VOX) ──
ptt_on = [0x1C, 0x00]
ptt_off = [0x1C, 0x00]
get_rf_power = [0x14, 0x0A]
set_rf_power = [0x14, 0x0A]
get_mic_gain = [0x14, 0x0B]
set_mic_gain = [0x14, 0x0B]
get_drive_gain = [0x14, 0x14]             # IC-7610 only
set_drive_gain = [0x14, 0x14]
get_compressor = [0x16, 0x44]
set_compressor = [0x16, 0x44]
get_compressor_level = [0x14, 0x0E]
set_compressor_level = [0x14, 0x0E]
get_monitor = [0x16, 0x45]
set_monitor = [0x16, 0x45]
get_monitor_gain = [0x14, 0x15]
set_monitor_gain = [0x14, 0x15]
get_vox = [0x16, 0x46]
set_vox = [0x16, 0x46]
get_vox_gain = [0x14, 0x16]
set_vox_gain = [0x14, 0x16]
get_anti_vox_gain = [0x14, 0x17]
set_anti_vox_gain = [0x14, 0x17]
get_ssb_tx_bandwidth = [0x16, 0x58]       # 0=WIDE, 1=MID, 2=NAR
set_ssb_tx_bandwidth = [0x16, 0x58]

# ── Split ──
get_xfc_status = [0x1C, 0x02]             # Transmit frequency monitor (XFC)
set_xfc_status = [0x1C, 0x02]
get_tx_freq_monitor = [0x1C, 0x03]
set_tx_freq_monitor = [0x1C, 0x03]

# ── CW ──
send_cw = [0x17]
stop_cw = [0x17]
get_cw_pitch = [0x14, 0x09]
set_cw_pitch = [0x14, 0x09]
get_key_speed = [0x14, 0x0C]
set_key_speed = [0x14, 0x0C]
get_break_in = [0x16, 0x47]               # 0=OFF, 1=Semi, 2=Full
set_break_in = [0x16, 0x47]
get_break_in_delay = [0x14, 0x0F]
set_break_in_delay = [0x14, 0x0F]

# ── RIT / ∂TX (XIT) ──
get_rit_frequency = [0x21, 0x00]
set_rit_frequency = [0x21, 0x00]
get_rit_status = [0x21, 0x01]
set_rit_status = [0x21, 0x01]
get_rit_tx_status = [0x21, 0x02]          # ∂TX on/off
set_rit_tx_status = [0x21, 0x02]

# ── Tuner / ATU ──
get_tuner_status = [0x1C, 0x01]           # 0=OFF, 1=ON, 2=Tuning
set_tuner_status = [0x1C, 0x01]

# ── Meters ──
get_s_meter = [0x15, 0x02]
get_s_meter_sql_status = [0x15, 0x01]
get_various_squelch = [0x15, 0x05]
get_overflow_status = [0x15, 0x07]
get_power_meter = [0x15, 0x11]
get_swr = [0x15, 0x12]
get_alc = [0x15, 0x13]
get_comp_meter = [0x15, 0x14]
get_vd_meter = [0x15, 0x15]
get_id_meter = [0x15, 0x16]

# ── Tone / TSQL ──
get_repeater_tone = [0x16, 0x42]          # 0=OFF, 1=ON
set_repeater_tone = [0x16, 0x42]
get_repeater_tsql = [0x16, 0x43]          # 0=OFF, 1=ON
set_repeater_tsql = [0x16, 0x43]
get_tone_freq = [0x1B, 0x00]
set_tone_freq = [0x1B, 0x00]
get_tsql_freq = [0x1B, 0x01]
set_tsql_freq = [0x1B, 0x01]

# ── Data Mode ──
get_data_mode = [0x1A, 0x06]
set_data_mode = [0x1A, 0x06]

# ── Scope ──
get_scope_wave = [0x27, 0x00]
set_scope_wave = [0x27, 0x00]
scope_on = [0x27, 0x10]
scope_off = [0x27, 0x10]
scope_data_output = [0x27, 0x11]
get_scope_main_sub = [0x27, 0x12]         # 0=MAIN, 1=SUB
get_scope_single_dual = [0x27, 0x13]
get_scope_mode = [0x27, 0x14]
get_scope_span = [0x27, 0x15]
get_scope_edge = [0x27, 0x16]
get_scope_hold = [0x27, 0x17]
get_scope_ref = [0x27, 0x19]
get_scope_speed = [0x27, 0x1A]
get_scope_during_tx = [0x27, 0x1B]
get_scope_center_type = [0x27, 0x1C]
get_scope_vbw = [0x27, 0x1D]
get_scope_fixed_edge = [0x27, 0x1E]
get_scope_rbw = [0x27, 0x1F]

# Main/Sub Prefix (CI-V 0x29) — wfview slot #132; distinct from cmd29 framing
get_main_sub_prefix = [0x29]
set_main_sub_prefix = [0x29]

# ── Scan ──
scan_start = [0x0E]
scan_stop = [0x0E]

# ── System / Power ──
power_on = [0x18]
power_off = [0x18]
get_transceiver_id = [0x19, 0x00]
get_speech = [0x13]
get_dial_lock = [0x16, 0x50]
set_dial_lock = [0x16, 0x50]
get_ref_adjust = [0x1A, 0x05, 0x00, 0x70]
set_ref_adjust = [0x1A, 0x05, 0x00, 0x70]

# ── Band Stacking Register ──
get_bsr = [0x1A, 0x01]                    # Read BSR contents
set_bsr = [0x1A, 0x01]                    # Write BSR contents

# ── Memory ──
set_memory_mode = [0x08]
memory_write = [0x09]
memory_to_vfo = [0x0A]
memory_clear = [0x0B]
set_memory_contents = [0x1A, 0x00]

# ── Menu Settings (0x1A 0x05 ...) ──
# These are SET menu items with model-specific sub-addresses.
# IC-7610 addresses (differ from IC-7300).

[commands.overrides]
get_acc1_mod_level = [0x1A, 0x05, 0x00, 0x88]
set_acc1_mod_level = [0x1A, 0x05, 0x00, 0x88]
get_usb_mod_level = [0x1A, 0x05, 0x00, 0x89]
set_usb_mod_level = [0x1A, 0x05, 0x00, 0x89]
get_lan_mod_level = [0x1A, 0x05, 0x00, 0x90]
set_lan_mod_level = [0x1A, 0x05, 0x00, 0x90]
get_data_off_mod_input = [0x1A, 0x05, 0x00, 0x91]
set_data_off_mod_input = [0x1A, 0x05, 0x00, 0x91]
get_data1_mod_input = [0x1A, 0x05, 0x00, 0x92]
set_data1_mod_input = [0x1A, 0x05, 0x00, 0x92]
get_data2_mod_input = [0x1A, 0x05, 0x00, 0x93]
set_data2_mod_input = [0x1A, 0x05, 0x00, 0x93]
get_data3_mod_input = [0x1A, 0x05, 0x00, 0x94]
set_data3_mod_input = [0x1A, 0x05, 0x00, 0x94]
get_civ_transceive = [0x1A, 0x05, 0x01, 0x12]
set_civ_transceive = [0x1A, 0x05, 0x01, 0x12]
get_system_date = [0x1A, 0x05, 0x01, 0x58]
set_system_date = [0x1A, 0x05, 0x01, 0x58]
get_system_time = [0x1A, 0x05, 0x01, 0x59]
set_system_time = [0x1A, 0x05, 0x01, 0x59]
get_utc_offset = [0x1A, 0x05, 0x01, 0x62]
set_utc_offset = [0x1A, 0x05, 0x01, 0x62]
get_quick_split = [0x1A, 0x05, 0x00, 0x33]
set_quick_split = [0x1A, 0x05, 0x00, 0x33]
get_quick_dual_watch = [0x1A, 0x05, 0x00, 0x32]
