# Rig Configuration — Xiegu X6100
# Xiegu X6100 QRP transceiver.
# Protocol: CI-V (IC-705 compatible subset)
# CIV address: 0x70
# Source: Xiegu X6100 documentation, CI-V reference

[radio]
id = "xiegu_x6100"
model = "X6100"
civ_addr = 0x70
receiver_count = 1
has_lan = false
has_wifi = true
default_baud = 115200

[protocol]
type = "civ"
address = 0x70

[capabilities]
# NOTE: ``filter_width`` is intentionally NOT advertised. The unified
# CI-V 0x1A 0x03 handler in ``radio.py`` requires per-mode segment tables
# (``[filters.width.<MODE>] segments``) decoded with wfview's
# ``funcFilterWidth`` formula (``icomcommander.cpp:1131``). The Xiegu X6100
# is a CI-V "IC-705 compatible subset" but its filter-width encoding is
# undocumented in wfview and unverified on hardware. Until segment tables
# are confirmed against an X6100, the capability stays disabled to avoid
# silently sending wrong indices (CI-V SET is fire-and-forget). Issue #1159.
#
# NOTE: the tone family (``repeater_tone`` / ``tsql``) and ``pbt`` are
# intentionally NOT advertised — dropped by X6100/X6200 shared-firmware
# inference, PENDING direct X6100 hardware confirmation (we have NO X6100
# to capture). Rationale (MOR-634):
#   - Hamlib ``rigs/icom/xiegu.c`` builds the X6200 (``RIG_MODEL_X6200`` =
#     3091) from the same ``x6100_priv_caps`` struct it uses for the X6100,
#     i.e. the two radios share one CI-V personality / firmware lineage.
#   - A live X6200 capture (CI-V 0xA4) then disproved these caps on real
#     hardware: the tone family's ``0x16 0x42/0x43`` + ``0x1B`` time out
#     (dropped in MOR-683 / PR #1833), and ``pbt``'s ``0x14 0x07/0x08``
#     time out in both AM and USB (dropped in MOR-699).
# By the shared-firmware inference the X6100 almost certainly behaves the
# same way, so advertising caps we cannot validate is exactly the
# over-declaration the validation harness exists to catch. These three are
# dropped here BY INFERENCE, not by a direct X6100 capture — do NOT relabel
# them "live confirmed" for the X6100 until a real X6100 is actually probed.
features = [
    "audio",
    "af_level",
    "rf_gain",
    "squelch",
    "attenuator",
    "preamp",
    "nb",
    "nr",
    "notch",
    "tx",
    "split",
    "vox",
    "compressor",
    "cw",
    "break_in",
    "rit",
    "xit",
    "tuner",
    "meters",
    "data_mode",
    "scan",
    "dial_lock",
]

[modes]
list = ["USB", "LSB", "CW", "CW-R", "AM", "FM", "RTTY", "DIGI"]

[filters]
list = ["FIL1", "FIL2", "FIL3"]

[vfo]
scheme = "ab"

[attenuator]
values = [0, 1]

[preamp]
values = [0, 1]

[controls.attenuator]
style = "toggle"

# Level control ranges — CI-V compatible (Xiegu X6100)
[controls.af_level]
raw_min = 0
raw_max = 255

[controls.rf_gain]
raw_min = 0
raw_max = 255

[controls.squelch]
raw_min = 0
raw_max = 255

[controls.nr_level]
raw_min = 0
raw_max = 255

[controls.nb_level]
raw_min = 0
raw_max = 255

[controls.compressor_level]
raw_min = 0
raw_max = 255

[controls.cw_pitch]
raw_min = 0
raw_max = 255
display_min = 300
display_max = 900
display_unit = "Hz"

[controls.rit]
raw_min = -9999
raw_max = 9999
raw_center = 0
display_min = -9999
display_max = 9999
display_unit = "Hz"

[[freq_ranges.ranges]]
label = "HF"
start_hz = 100000
end_hz = 54000000

