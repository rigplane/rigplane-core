# ── CW / power / ID ──
send_cw = [0x17]
stop_cw = [0x17]
power_on = [0x18]
power_off = [0x18]
get_transceiver_id = [0x19, 0x00]
set_transceiver_id = [0x19, 0x00]

# ── 0x1A ──
get_memory_contents = [0x1A, 0x00]
set_memory_contents = [0x1A, 0x00]
get_bsr = [0x1A, 0x01]
set_bsr = [0x1A, 0x01]
get_filter_width = [0x1A, 0x03]
set_filter_width = [0x1A, 0x03]
# NOTE: IC-7300.rig: AGC Time Constant 0x1A 0x04 — NOT in IC-705.rig
get_data_mode = [0x1A, 0x06]
set_data_mode = [0x1A, 0x06]

# ── Tone / DTCS / CSQL ──
get_tone_freq = [0x1B, 0x00]
set_tone_freq = [0x1B, 0x00]
get_tsql_freq = [0x1B, 0x01]
set_tsql_freq = [0x1B, 0x01]
get_dtcs = [0x1B, 0x02]
set_dtcs = [0x1B, 0x02]
get_csql = [0x1B, 0x07]
set_csql = [0x1B, 0x07]

# ── Status / TX / CI-V output ──
ptt_on = [0x1C, 0x00]
ptt_off = [0x1C, 0x00]
get_transceiver_status = [0x1C, 0x00]
set_transceiver_status = [0x1C, 0x00]
get_tuner_status = [0x1C, 0x01]
set_tuner_status = [0x1C, 0x01]
get_xfc_status = [0x1C, 0x02]
set_xfc_status = [0x1C, 0x02]
get_tx_freq_monitor = [0x1C, 0x03]
set_tx_freq_monitor = [0x1C, 0x03]
get_civ_output = [0x1C, 0x04]
set_civ_output = [0x1C, 0x04]
# NOTE: IC-7610 maps 0x1C 0x04 under antenna context; IC-705.rig labels it "CI-V Output"

# ── RIT / XIT ──
get_rit_frequency = [0x21, 0x00]
set_rit_frequency = [0x21, 0x00]
get_rit_status = [0x21, 0x01]
set_rit_status = [0x21, 0x01]
get_rit_tx_status = [0x21, 0x02]
set_rit_tx_status = [0x21, 0x02]

# ── Selected / unselected VFO ──
get_selected_freq = [0x25, 0x00]
set_selected_freq = [0x25, 0x00]
get_unselected_freq = [0x25, 0x01]
set_unselected_freq = [0x25, 0x01]
get_selected_mode = [0x26, 0x00]
set_selected_mode = [0x26, 0x00]
get_unselected_mode = [0x26, 0x01]
set_unselected_mode = [0x26, 0x01]

# ── Scope ──
get_scope_wave = [0x27, 0x00]
set_scope_wave = [0x27, 0x00]
scope_on = [0x27, 0x10]
scope_off = [0x27, 0x10]
