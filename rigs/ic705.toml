# Rig Configuration — IC-705
# This file defines the IC-705 radio profile in TOML format.
# See _schema.md for field documentation.
#
# Source of truth: references/wfview/rigs/IC-705.rig (v2.10)
# Cross-check: IC-7300.rig / IC-7610.rig (differences called out in NOTE comments)
# docs/research/ic705-research.md
#
# Non-CI-V features: built-in GPS, Bluetooth, and WiFi are hardware/UI managed.
# [radio].has_wifi reflects WiFi; no separate CI-V opcodes for GPS/BT in wfview IC-705.rig.

[radio]
id = "icom_ic705"
model = "IC-705"
civ_addr = 0xA4
default_baud = 115200  # Required for scope data over serial CI-V
receiver_count = 1
has_lan = true
has_wifi = true

[spectrum]
seq_max = 11
amp_max = 160
data_len_max = 475

# Pin mono-first codec (#797). Single-RX firmware has not been hardware-validated
# to accept stereo rx_codec at conninfo — negotiating stereo risks immediate
# session rejection (error=0xFFFFFFFF). Pair with ``_control_phase`` retry-with-
# mono fallback as belt-and-braces.
[audio]
codec_preference = ["PCM_1CH_16BIT", "ULAW_1CH"]
tx_codec = "PCM_1CH_16BIT"
browser_rx_transport = "auto"
browser_rx_transcode_to_opus = true

# ── Capabilities ─────────────────────────────────────────────────

[capabilities]
features = [
    # Receiver
    "audio",
    "af_level",
    "rf_gain",
    "squelch",
    # RF front end
    "attenuator",
    "preamp",
    "digisel",       # wfview: DIGI-SEL Shift (0x14 0x13) only — no 0x16 0x4E toggle in IC-705.rig
    # Antenna
    "antenna",
    "rx_antenna",    # wfview: RX Antenna 0x16 0x53 (IC-7300.rig omits this command)
    # DSP / Noise
    "nb",
    "nr",
    "notch",
    "apf",
    "twin_peak",
    # Filter
    "pbt",
    "filter_width",
    "filter_shape",
    # TX
    "tx",
    "split",
    "vox",
    "compressor",
    "monitor",
    "drive_gain",    # wfview IC-705: 0x14 0x14 (not in IC-7300.rig)
    "ssb_tx_bw",
    # CW
    "cw",
    "break_in",
    # RIT / XIT
    "rit",
    "xit",
    # Tuner
    "tuner",
    # Metering
    "meters",
    # Scope
    "scope",
    # Tone / FM
    "repeater_tone",
    "tsql",
    "dtcs",
    "csql",
    "voice_tx",      # wfview: Voice TX 0x28 (Max=8) — D-STAR voice; not on IC-7300.rig
    # Data
    "data_mode",
    # System
    "power_control",
    "dial_lock",
    "scan",
    "bsr",
    # AGC
    "agc",
    "tuning_step",
    "band_edge",
    "xfc",
    # System
    "system_settings",
]

# ── Parameterized Capabilities ───────────────────────────────────

[attenuator]
# CI-V 0x11: binary toggle (wfview Max=20)
values = [0, 20]

[preamp]
# CI-V 0x16 0x02: 0=OFF, 1=P.AMP1, 2=P.AMP2
values = [0, 1, 2]

[agc]
# CI-V 0x16 0x12: wfview Type=AGC Time Constant, Min=1 Max=3 (FAST/MID/SLOW)
modes = [1, 2, 3]
labels = { "1" = "FAST", "2" = "MID", "3" = "SLOW" }

[antenna]
# CI-V 0x12: single antenna path; RX antenna separate command 0x16 0x53
tx_count = 1
has_rx_ant = true

[apf]
# CI-V 0x16 0x32: wfview Max=3 (WIDE/MID/NAR style); 0x14 0x05 APF Type Level also present on IC-705
values = [0, 1, 2, 3]
labels = { "0" = "OFF", "1" = "WIDE", "2" = "MID", "3" = "NAR" }

[notch]
# NOTE: IC-7300.rig includes Manual Notch Width 0x16 0x57; IC-705.rig does NOT list it.
# Width labels kept for UI parity; no CI-V mapping in [commands] for IC-705.
width_values = [0, 1, 2]
width_labels = { "0" = "WIDE", "1" = "MID", "2" = "NAR" }

[ssb_tx_bw]
values = [0, 1, 2]
labels = { "0" = "WIDE", "1" = "MID", "2" = "NAR" }

[break_in]
# CI-V 0x16 0x47: wfview IC-705 Max=2 (IC-7300.rig Max=1 — 705 adds full break-in)
values = [0, 1, 2]
labels = { "0" = "OFF", "1" = "SEMI", "2" = "FULL" }

[rit]
range_hz = 9999

[cw]
pitch_min_hz = 300
pitch_max_hz = 900
speed_min_wpm = 6
speed_max_wpm = 48
# wfview IC-705: Dash Ratio 0x1A 0x05 0x02 0x52, Min=28 Max=45
dash_ratio_min = 28
dash_ratio_max = 45

[nb]
# NB on/off + level 0x14 0x12. wfview IC-705 has NO NB Depth/Width menu cmds (IC-7300 uses 0x01 0x89 / 0x01 0x90).
depth_min = 0
depth_max = 9
width_min = 0
width_max = 255

[power]
max_watts = 10

[modes]
# wfview Modes: LSB, USB, AM, CW, RTTY, FM, CW-R, RTTY-R, DV, WFM
list = ["USB", "LSB", "CW", "CW-R", "AM", "FM", "WFM", "RTTY", "RTTY-R", "DV"]

[data_mode]
count = 1
labels = { "0" = "OFF", "1" = "DATA" }

# wfview Inputs: MIC, USB, M/U, WLAN — Data Off / DATA1 mod Max=3 per IC-705.rig
inputs = [
    { value = 0, name = "MIC" },
    { value = 1, name = "USB" },
    { value = 2, name = "M/U" },
    { value = 3, name = "WLAN" },
]

[filters]
list = ["FIL1", "FIL2", "FIL3"]
# CI-V 0x1A 0x03: width is a 1-byte BCD index, not raw Hz.
# wfview's funcFilterWidth handler (icomcommander.cpp:1131) decodes a single
# BCD byte using the same segmented formula for all Icom rigs:
#   non-AM: pass 0..10 → 50..550 Hz step 50; pass 11..40 → 700..3600 Hz step 100
#   AM:     pass 0..49 → 200..10000 Hz step 200
# Matches IC-7610 / IC-7300 (issue #1156).
encoding = "segmented_bcd_index"
width_min_hz = 50
width_max_hz = 10000

[filters.width.USB]
min_hz = 50
max_hz = 3600
defaults = [3000, 2400, 1800]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.LSB]
min_hz = 50
max_hz = 3600
defaults = [3000, 2400, 1800]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.CW]
min_hz = 50
max_hz = 3600
defaults = [1200, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.CW-R]
min_hz = 50
max_hz = 3600
defaults = [1200, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 3600, step_hz = 100, index_min = 10 },
]

[filters.width.RTTY]
min_hz = 50
max_hz = 2700
defaults = [2400, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 2700, step_hz = 100, index_min = 10 },
]

[filters.width.RTTY-R]
min_hz = 50
max_hz = 2700
defaults = [2400, 500, 250]
segments = [
    { hz_min = 50, hz_max = 500, step_hz = 50, index_min = 0 },
    { hz_min = 600, hz_max = 2700, step_hz = 100, index_min = 10 },
]

[filters.width.AM]
min_hz = 200
max_hz = 10000
step_hz = 200
defaults = [9000, 6000, 3000]
segments = [
    { hz_min = 200, hz_max = 10000, step_hz = 200, index_min = 0 },
]

[filters.width.FM]
fixed = true
defaults = [15000, 10000, 7000]

[filters.width.WFM]
fixed = true
defaults = [200000, 200000, 200000]

[filters.width.DV]
fixed = true
defaults = [7000, 7000, 7000]

[vfo]
scheme = "ab"
main_select = [0x00]
sub_select = [0x01]
swap_ab = [0xB0]
equal_ab = [0xA0]

